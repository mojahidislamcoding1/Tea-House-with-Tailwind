<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Tea House</title>
   <!-- Google fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <!-- font-awesome cdn -->
  <script src="https://kit.fontawesome.com/9232fefe23.js" crossorigin="anonymous"></script>
  <!-- tailwind css cdn -->
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
        colors: {
          clifford: '#da373d',
        },
      },
    },
  }
  </script>
  <style>
  .manrope-font {
  font-family: "Manrope", sans-serif;
}
  </style>
</head>
<body class="manrope-font">
    <main class="max-w-screen-xl mx-auto px-16 lg:px-24">
      <header class="flex pt-10 mb-20 items-center">
        <!-- Text content  -->
        <div>
          <h1 class=" text-5xl md:text-7xl text-[#1C1C1C] font-extrabold">It's good <br> tea time at The  Tea House</h1>
            <br>
            <p class="text-[#777777] w-3/5">Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
            <br>
            <button class="bg-linear-to-r from-orange-500 to-red-500 px-5 py-3 text-white font-bold rounded-lg ">Explore More <i class="fa-solid fa-arrow-right-long -rotate-45"></i></button>
        </div>
        <!-- image Content  -->
         <div class="relative" >
          <!-- imgage  -->
           <div>
              <img class="w-full" src="images/banner.png" alt="">
           </div>
           <!-- card  -->
            <div class=" absolute flex items-center gap-3 bg-white shadow-lg px-2 py-2 md:px-6 lg:py-5 w-[235px] h-[100px] rounded-lg top-28 md:top-80 md:right-32 lg:left-8 lg:top-70">
              <!-- Star -->
              <div><i class="fa-solid fa-star text-[#EFBF04] text-2xl"></i></div>
              <!-- Text  -->
              <div>
               <h2 class=" font-extrabold text-[24px]">5.00</h2>
               <p class="text-[#777777] font-semibold ">Trust Pilot Ratings</p>
              </div>
            </div>
         </div>
      </header>
    </main>
</body>
</html>
